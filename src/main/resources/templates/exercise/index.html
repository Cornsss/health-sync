<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Health-Sync — 运动日志</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <style>
    :root {
      --apple-gray-1: #f5f5f7;
      --apple-gray-2: #e3e3e5;
      --apple-gray-5: #86868b;
      --apple-orange: #ff9500;
      --apple-green: #34c759;
      --apple-blue: #0071e3;
      --apple-red: #ff3b30;
      --apple-bg: #ffffff;
      --apple-card: #ffffff;
      --apple-text: #1d1d1f;
      --apple-text-secondary: #86868b;
      --apple-radius: 16px;
      --apple-radius-lg: 20px;
      --apple-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { -webkit-font-smoothing: antialiased; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      background: var(--apple-gray-1);
      color: var(--apple-text);
      min-height: 100vh;
      padding-bottom: 100px;
    }

    .nav-bottom {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--apple-bg);
      display: flex;
      justify-content: space-around;
      padding: 8px 0 max(8px, env(safe-area-inset-bottom));
      box-shadow: 0 -1px 0 rgba(0,0,0,0.1);
      z-index: 1000;
    }
    .nav-bottom a {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      text-decoration: none;
      color: var(--apple-text-secondary);
      font-size: 10px;
      transition: color 0.2s;
    }
    .nav-bottom a i { font-size: 22px; }
    .nav-bottom a.active { color: var(--apple-orange); }

    .header {
      background: var(--apple-bg);
      padding: 16px 20px 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-title { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }

    .card {
      background: var(--apple-card);
      border: none;
      border-radius: var(--apple-radius);
      box-shadow: var(--apple-shadow);
    }

    .fatburn-info {
      background: var(--apple-card);
      border-radius: var(--apple-radius);
      padding: 12px 16px;
      margin: 0 20px 16px;
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .fatburn-badge {
      background: rgba(255,149,0,0.15);
      color: var(--apple-orange);
      padding: 4px 10px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 600;
    }

    .stats-card {
      background: var(--apple-card);
      border-radius: var(--apple-radius);
      padding: 16px;
      margin: 0 20px 12px;
      box-shadow: var(--apple-shadow);
      text-align: center;
    }
    .stats-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--apple-orange);
    }
    .stats-label {
      font-size: 12px;
      color: var(--apple-text-secondary);
      margin-top: 2px;
    }
    .stats-goal {
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 8px;
      margin-top: 6px;
      display: inline-block;
    }
    .stats-goal.done { background: rgba(52,199,89,0.15); color: var(--apple-green); }
    .stats-goal.remaining { background: rgba(255,149,0,0.15); color: var(--apple-orange); }

    .record-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: calc(100% - 40px);
      margin: 0 20px 16px;
      padding: 14px;
      background: var(--apple-card);
      border: 2px dashed var(--apple-gray-2);
      border-radius: var(--apple-radius);
      color: var(--apple-orange);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .record-btn:active {
      background: var(--apple-gray-1);
      border-color: var(--apple-orange);
    }

    .form-card {
      background: var(--apple-card);
      border-radius: var(--apple-radius);
      margin: 0 20px 16px;
      box-shadow: var(--apple-shadow);
      overflow: hidden;
      display: none;
    }
    .form-card.show { display: block; }
    .form-header {
      background: var(--apple-orange);
      color: white;
      padding: 12px 16px;
      font-weight: 600;
      font-size: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .form-header .close-btn {
      background: none;
      border: none;
      color: white;
      font-size: 20px;
      cursor: pointer;
    }
    .form-body { padding: 16px; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    .form-group { margin-bottom: 12px; }
    .form-group.full { grid-column: span 2; }
    .form-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--apple-text-secondary);
      margin-bottom: 4px;
      display: block;
    }
    .form-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--apple-gray-2);
      border-radius: 10px;
      font-size: 15px;
      background: var(--apple-gray-1);
      outline: none;
    }
    .form-input:focus {
      border-color: var(--apple-orange);
      box-shadow: 0 0 0 3px rgba(255,149,0,0.15);
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--apple-orange);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .submit-btn:active { opacity: 0.8; }

    .chart-card {
      background: var(--apple-card);
      border-radius: var(--apple-radius);
      padding: 16px;
      margin: 0 20px 16px;
      box-shadow: var(--apple-shadow);
    }
    .chart-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .today-section {
      margin: 0 20px 16px;
    }
    .section-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .log-card {
      background: var(--apple-card);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      box-shadow: var(--apple-shadow);
    }
    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .log-type {
      font-size: 11px;
      padding: 4px 8px;
      background: rgba(255,149,0,0.15);
      color: var(--apple-orange);
      border-radius: 6px;
      font-weight: 600;
    }
    .log-duration {
      font-size: 18px;
      font-weight: 700;
      color: var(--apple-text);
    }
    .log-min {
      font-size: 12px;
      color: var(--apple-text-secondary);
    }
    .log-stats {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: var(--apple-text-secondary);
    }
    .log-note {
      font-size: 12px;
      color: var(--apple-text-secondary);
      margin-top: 6px;
    }
    .fatburn-tag {
      font-size: 11px;
      padding: 3px 8px;
      background: rgba(52,199,89,0.15);
      color: var(--apple-green);
      border-radius: 6px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--apple-text-secondary);
    }
    .empty-state i {
      font-size: 40px;
      margin-bottom: 12px;
      opacity: 0.5;
    }
  </style>
</head>
<body>
<div class="header">
  <div class="header-title">&#127939; 运动日志</div>
</div>

<nav class="nav-bottom">
  <a href="/"><i class="fas fa-house"></i>首页</a>
  <a href="/metrics"><i class="fas fa-chart-line"></i>趋势</a>
  <a href="/water"><i class="fas fa-droplet"></i>喝水</a>
  <a href="/exercise" class="active"><i class="fas fa-person-running"></i>运动</a>
  <a href="/meals"><i class="fas fa-utensils"></i>饮食</a>
</nav>

<div class="fatburn-info">
  <span>有效燃脂心率：<strong th:text="${fatBurnLow} + ' ~ ' + ${fatBurnHigh} + ' bpm'"></strong></span>
  <span class="fatburn-badge">目标 150分钟/周</span>
</div>

<div class="stats-card">
  <div class="stats-value" th:text="${weeklyFatBurnMin}"></div>
  <div class="stats-label">本周有效燃脂（分钟）</div>
  <span th:if="${weeklyFatBurnMin >= 150}" class="stats-goal done">&#10003; 本周已达标</span>
  <span th:unless="${weeklyFatBurnMin >= 150}" class="stats-goal remaining"
        th:text="'还差 ' + (150 - ${weeklyFatBurnMin}) + ' 分钟'"></span>
</div>

<div class="stats-card" style="margin-top:0;">
  <div class="stats-value" th:text="${weeklyLogs.size()}"></div>
  <div class="stats-label">本周运动次数</div>
</div>

<button class="record-btn" onclick="toggleForm()">
  <i class="fas fa-plus-circle"></i> 记录运动
</button>

<div class="form-card" id="exerciseForm">
  <div class="form-header">
    <span>记录运动</span>
    <button class="close-btn" onclick="toggleForm()">&times;</button>
  </div>
  <div class="form-body">
    <form th:action="@{/exercise}" method="post" th:object="${form}">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">日期</label>
          <input type="date" th:field="*{exerciseDate}" class="form-input"/>
        </div>
        <div class="form-group">
          <label class="form-label">运动类型</label>
          <select th:field="*{exerciseType}" class="form-input">
            <option value="">请选择</option>
            <option value="快走">快走</option>
            <option value="慢跑">慢跑</option>
            <option value="游泳">游泳</option>
            <option value="骑行">骑行</option>
            <option value="瑜伽">瑜伽</option>
            <option value="椭圆机">椭圆机</option>
            <option value="其他">其他</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">时长（分钟）</label>
          <input type="number" th:field="*{durationMin}" min="1" max="300" class="form-input"/>
        </div>
        <div class="form-group">
          <label class="form-label">平均心率 (bpm)</label>
          <input type="number" th:field="*{avgHeartRate}" min="60" max="200" placeholder="可选" class="form-input"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">燃脂区间（分钟）</label>
        <input type="number" th:field="*{fatBurnMin}" min="0" placeholder="留空自动计算" class="form-input"/>
      </div>
      <div class="form-group">
        <label class="form-label">备注</label>
        <input type="text" th:field="*{note}" placeholder="可选" class="form-input"/>
      </div>
      <button type="submit" class="submit-btn">保存运动记录</button>
    </form>
  </div>
</div>

<div class="chart-card">
  <div class="chart-title">本周运动趋势</div>
  <canvas id="exerciseChart" height="160"></canvas>
</div>

<div class="today-section">
  <div class="section-title">今日运动</div>
  <div th:if="${todayLogs.isEmpty()}" class="empty-state">
    <i class="fas fa-person-running"></i>
    <div>今日暂无运动记录</div>
  </div>
  <div th:unless="${todayLogs.isEmpty()}">
    <div th:each="log : ${todayLogs}" class="log-card">
      <div class="log-header">
        <span class="log-type" th:text="${log.exerciseType ?: '运动'}"></span>
        <div class="d-flex align-items-center gap-2">
          <span th:if="${log.fatBurnMin != null and log.fatBurnMin > 0}" class="fatburn-tag"
                th:text="'燃脂 ' + ${log.fatBurnMin} + ' 分钟'"></span>
          <form th:action="@{/exercise/delete/{id}(id=${log.id})}" method="post">
            <button type="submit" class="btn btn-sm" onclick="return confirm('确认删除？')" style="background:none;border:none;color:#ff3b30;padding:4px;">
              <i class="fas fa-trash-alt"></i>
            </button>
          </form>
        </div>
      </div>
      <div>
        <span class="log-duration" th:text="${log.durationMin}"></span>
        <span class="log-min">分钟</span>
      </div>
      <div class="log-stats">
        <span th:if="${log.avgHeartRate != null}" th:text="'心率 ' + ${log.avgHeartRate} + ' bpm'"></span>
      </div>
      <div class="log-note" th:if="${log.note}" th:text="${log.note}"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script th:inline="javascript">
  function toggleForm() {
    const form = document.getElementById('exerciseForm');
    form.classList.toggle('show');
  }

  const weekLabels    = /*[[${weekLabels}]]*/ [];
  const weekDurations = /*[[${weekDurations}]]*/ [];
  const weekFatBurns  = /*[[${weekFatBurns}]]*/ [];

  new Chart(document.getElementById('exerciseChart'), {
    type: 'bar',
    data: {
      labels: weekLabels,
      datasets: [
        {
          label: '运动时长',
          data: weekDurations,
          backgroundColor: 'rgba(255,149,0,0.6)',
          borderRadius: 6
        },
        {
          label: '有效燃脂',
          data: weekFatBurns,
          backgroundColor: 'rgba(52,199,89,0.6)',
          borderRadius: 6
        }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { position: 'top', labels: { usePointStyle: true, padding: 20 } }
      },
      scales: {
        y: { beginAtZero: true, grid: { display: false } },
        x: { grid: { display: false } }
      }
    }
  });
</script>
</body>
</html>
