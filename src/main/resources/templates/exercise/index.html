<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Health-Sync — 运动日志</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<div th:replace="~{fragments/nav :: navbar}"></div>
<div th:replace="~{fragments/nav :: flash}"></div>

<div class="container-fluid py-3 px-3">
  <h5 class="fw-bold text-warning mb-3">&#127939; 运动日志</h5>

  <!-- ── 燃脂区间说明 ───────────────────────────────────────────── -->
  <div class="alert alert-warning small py-2">
    <strong>有效燃脂心率区间：</strong>
    <span th:text="${fatBurnLow} + ' ~ ' + ${fatBurnHigh} + ' bpm'"></span>
    （最大心率的 60%~70%）｜ 本周目标：150 分钟有效燃脂
  </div>

  <!-- ── 本周统计卡 ─────────────────────────────────────────────── -->
  <div class="row g-3 mb-4">
    <div class="col-6">
      <div class="card text-center shadow-sm border-warning">
        <div class="card-body py-3">
          <div class="fw-bold fs-4 text-warning" th:text="${weeklyFatBurnMin} + ' 分'"></div>
          <div class="small text-muted">本周有效燃脂</div>
          <span th:if="${weeklyFatBurnMin >= 150}" class="badge bg-success">&#10003; 达标</span>
          <span th:unless="${weeklyFatBurnMin >= 150}" class="badge bg-warning text-dark"
                th:text="'还差 ' + (150 - ${weeklyFatBurnMin}) + ' 分'"></span>
        </div>
      </div>
    </div>
    <div class="col-6">
      <div class="card text-center shadow-sm">
        <div class="card-body py-3">
          <div class="fw-bold fs-4" th:text="${weeklyLogs.size()} + ' 次'"></div>
          <div class="small text-muted">本周运动次数</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── 记录运动表单 ───────────────────────────────────────────── -->
  <div class="card shadow-sm mb-4">
    <div class="card-header bg-warning text-dark fw-bold" data-bs-toggle="collapse"
         data-bs-target="#exerciseForm" style="cursor:pointer">
      &#43; 记录运动（点击展开）
    </div>
    <div class="collapse show" id="exerciseForm">
      <div class="card-body">
        <form th:action="@{/exercise}" method="post" th:object="${form}">
          <div class="row g-3">
            <div class="col-6 col-md-3">
              <label class="form-label small fw-bold">日期</label>
              <input type="date" th:field="*{exerciseDate}" class="form-control form-control-sm"/>
            </div>
            <div class="col-6 col-md-3">
              <label class="form-label small fw-bold">运动类型</label>
              <select th:field="*{exerciseType}" class="form-select form-select-sm">
                <option value="">请选择</option>
                <option value="快走">快走</option>
                <option value="慢跑">慢跑</option>
                <option value="游泳">游泳</option>
                <option value="骑行">骑行</option>
                <option value="瑜伽">瑜伽</option>
                <option value="椭圆机">椭圆机</option>
                <option value="其他">其他</option>
              </select>
            </div>
            <div class="col-6 col-md-2">
              <label class="form-label small fw-bold">时长（分钟）</label>
              <input type="number" th:field="*{durationMin}" min="1" max="300"
                     class="form-control form-control-sm"/>
            </div>
            <div class="col-6 col-md-2">
              <label class="form-label small fw-bold">平均心率 (bpm)</label>
              <input type="number" th:field="*{avgHeartRate}" min="60" max="200"
                     placeholder="可选" class="form-control form-control-sm"/>
            </div>
            <div class="col-6 col-md-2">
              <label class="form-label small fw-bold">燃脂区间（分钟）</label>
              <input type="number" th:field="*{fatBurnMin}" min="0"
                     placeholder="留空自动计算" class="form-control form-control-sm"/>
            </div>
            <div class="col-12">
              <label class="form-label small fw-bold">备注</label>
              <input type="text" th:field="*{note}" class="form-control form-control-sm"/>
            </div>
            <div class="col-12">
              <button type="submit" class="btn btn-warning">&#10003; 保存运动记录</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- ── 本周趋势图 ────────────────────────────────────────────── -->
  <div class="card shadow-sm mb-4">
    <div class="card-header bg-white fw-bold">本周运动趋势</div>
    <div class="card-body"><canvas id="exerciseChart" height="120"></canvas></div>
  </div>

  <!-- ── 今日运动记录 ───────────────────────────────────────────── -->
  <div class="card shadow-sm">
    <div class="card-header bg-white fw-bold">今日运动记录</div>
    <div class="card-body p-0">
      <div th:if="${todayLogs.isEmpty()}" class="text-center text-muted py-3">今日暂无运动记录</div>
      <ul class="list-group list-group-flush" th:unless="${todayLogs.isEmpty()}">
        <li th:each="log : ${todayLogs}" class="list-group-item">
          <div class="d-flex justify-content-between align-items-center">
            <div>
              <span class="badge bg-warning text-dark me-1" th:text="${log.exerciseType ?: '运动'}"></span>
              <strong th:text="${log.durationMin} + ' 分钟'"></strong>
              <span th:if="${log.avgHeartRate != null}" class="ms-2 small text-muted"
                    th:text="'平均心率 ' + ${log.avgHeartRate} + ' bpm'"></span>
            </div>
            <div>
              <span th:if="${log.fatBurnMin != null and log.fatBurnMin > 0}"
                    class="badge bg-success" th:text="'燃脂 ' + ${log.fatBurnMin} + ' 分'"></span>
            </div>
          </div>
          <div th:if="${log.note}" class="small text-muted mt-1" th:text="${log.note}"></div>
        </li>
      </ul>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script th:inline="javascript">
  const weekLabels    = JSON.parse(/*[[${weekLabels}]]*/    '[]');
  const weekDurations = JSON.parse(/*[[${weekDurations}]]*/ '[]');
  const weekFatBurns  = JSON.parse(/*[[${weekFatBurns}]]*/  '[]');

  new Chart(document.getElementById('exerciseChart'), {
    type: 'bar',
    data: {
      labels: weekLabels,
      datasets: [
        {
          label: '运动时长（分）',
          data: weekDurations,
          backgroundColor: 'rgba(255, 193, 7, 0.6)',
          borderColor: '#ffc107',
          borderWidth: 1
        },
        {
          label: '有效燃脂（分）',
          data: weekFatBurns,
          backgroundColor: 'rgba(25, 135, 84, 0.6)',
          borderColor: '#198754',
          borderWidth: 1
        }
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { position: 'top' } },
      scales: { y: { beginAtZero: true } }
    }
  });
</script>
</body>
</html>
