<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Health-Sync — 指标记录</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<div th:replace="~{fragments/nav :: navbar}"></div>
<div th:replace="~{fragments/nav :: flash}"></div>

<div class="container-fluid py-3 px-3">
  <h5 class="fw-bold text-primary mb-3">&#128203; 健康指标记录</h5>

  <!-- ── 录入表单 ──────────────────────────────────────────────── -->
  <div class="card shadow-sm mb-4">
    <div class="card-header bg-primary text-white fw-bold" data-bs-toggle="collapse"
         data-bs-target="#formCollapse" style="cursor:pointer">
      &#43; 录入今日指标（点击展开）
    </div>
    <div class="collapse show" id="formCollapse">
      <div class="card-body">
        <form th:action="@{/metrics}" method="post" th:object="${form}">
          <div class="row g-3">
            <div class="col-6 col-md-3">
              <label class="form-label small fw-bold">日期</label>
              <input type="date" th:field="*{recordedAt}" class="form-control form-control-sm"/>
            </div>
            <div class="col-6 col-md-3">
              <label class="form-label small fw-bold">体重 (kg)</label>
              <input type="number" step="0.1" th:field="*{weightKg}"
                     placeholder="55.0" class="form-control form-control-sm"/>
            </div>
            <div class="col-6 col-md-3">
              <label class="form-label small fw-bold">体脂率 (%)</label>
              <input type="number" step="0.1" th:field="*{bodyFatPct}"
                     placeholder="20.0" class="form-control form-control-sm"/>
            </div>
            <div class="col-6 col-md-3">
              <label class="form-label small fw-bold text-danger">尿酸 (μmol/L)</label>
              <input type="number" th:field="*{uricAcid}"
                     placeholder="420以下为正常" class="form-control form-control-sm"/>
            </div>
            <div class="col-6 col-md-3">
              <label class="form-label small fw-bold">ALT 谷丙 (U/L)</label>
              <input type="number" step="0.1" th:field="*{alt}"
                     placeholder="40以下" class="form-control form-control-sm"/>
            </div>
            <div class="col-6 col-md-3">
              <label class="form-label small fw-bold">AST 谷草 (U/L)</label>
              <input type="number" step="0.1" th:field="*{ast}"
                     class="form-control form-control-sm"/>
            </div>
            <div class="col-6 col-md-3">
              <label class="form-label small fw-bold text-warning">GGT (U/L)</label>
              <input type="number" step="0.1" th:field="*{ggt}"
                     placeholder="45以下" class="form-control form-control-sm"/>
            </div>
            <div class="col-6 col-md-3">
              <label class="form-label small fw-bold">肾结晶 (mm)</label>
              <input type="number" step="0.1" th:field="*{kidneyCrystalMm}"
                     class="form-control form-control-sm"/>
            </div>
            <div class="col-6 col-md-3">
              <label class="form-label small fw-bold">肌酐 (μmol/L)</label>
              <input type="number" step="0.1" th:field="*{creatinine}"
                     class="form-control form-control-sm"/>
            </div>
            <div class="col-12 col-md-9">
              <label class="form-label small fw-bold">备注</label>
              <input type="text" th:field="*{note}" class="form-control form-control-sm"/>
            </div>
            <div class="col-12">
              <button type="submit" class="btn btn-primary">&#10003; 保存指标</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- ── 指标参考值说明 ─────────────────────────────────────────── -->
  <div class="alert alert-info small mb-4">
    <strong>参考值：</strong>
    尿酸 &lt;420 μmol/L ｜ ALT &lt;40 U/L ｜ GGT &lt;45 U/L ｜ 体重目标 55 kg ｜ 体脂 ≤20%
  </div>

  <!-- ── 趋势图 ────────────────────────────────────────────────── -->
  <div class="row g-3 mb-4">
    <div class="col-12 col-md-6">
      <div class="card shadow-sm">
        <div class="card-header bg-white fw-bold">尿酸趋势</div>
        <div class="card-body"><canvas id="uricChart" height="140"></canvas></div>
      </div>
    </div>
    <div class="col-12 col-md-6">
      <div class="card shadow-sm">
        <div class="card-header bg-white fw-bold">体重趋势</div>
        <div class="card-body"><canvas id="weightChart" height="140"></canvas></div>
      </div>
    </div>
    <div class="col-12">
      <div class="card shadow-sm">
        <div class="card-header bg-white fw-bold">肝酶趋势（ALT / GGT）</div>
        <div class="card-body"><canvas id="liverChart" height="100"></canvas></div>
      </div>
    </div>
  </div>

  <!-- ── 历史记录表 ─────────────────────────────────────────────── -->
  <div class="card shadow-sm">
    <div class="card-header bg-white fw-bold">历史记录（最近30条）</div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-sm table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th>日期</th><th>体重</th><th>体脂%</th>
              <th>尿酸</th><th>ALT</th><th>GGT</th>
              <th>肾结晶</th><th>备注</th>
            </tr>
          </thead>
          <tbody>
            <tr th:if="${allMetrics.isEmpty()}">
              <td colspan="8" class="text-center text-muted py-3">暂无记录</td>
            </tr>
            <tr th:each="m : ${allMetrics}">
              <td th:text="${m.recordedAt}"></td>
              <td th:text="${m.weightKg != null} ? ${m.weightKg} + 'kg' : '—'"></td>
              <td th:text="${m.bodyFatPct != null} ? ${m.bodyFatPct} + '%' : '—'"></td>
              <td>
                <span th:if="${m.uricAcid != null}"
                      th:classappend="${m.uricAcid > 420} ? 'text-danger fw-bold' : 'text-success'"
                      th:text="${m.uricAcid}"></span>
                <span th:unless="${m.uricAcid != null}">—</span>
              </td>
              <td>
                <span th:if="${m.alt != null}"
                      th:classappend="${m.alt.doubleValue() > 40} ? 'text-danger' : ''"
                      th:text="${m.alt}"></span>
                <span th:unless="${m.alt != null}">—</span>
              </td>
              <td>
                <span th:if="${m.ggt != null}"
                      th:classappend="${m.ggt.doubleValue() > 45} ? 'text-warning fw-bold' : ''"
                      th:text="${m.ggt}"></span>
                <span th:unless="${m.ggt != null}">—</span>
              </td>
              <td th:text="${m.kidneyCrystalMm != null} ? ${m.kidneyCrystalMm} + 'mm' : '—'"></td>
              <td><small th:text="${m.note}"></small></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script th:inline="javascript">
  const labels     = /*[[${chartLabels}]]*/ '[]';
  const uricData   = /*[[${uricData}]]*/   '[]';
  const weightData = /*[[${weightData}]]*/ '[]';
  const ggtData    = /*[[${ggtData}]]*/    '[]';
  const altData    = /*[[${altData}]]*/    '[]';

  const L = JSON.parse(labels);
  const uric = JSON.parse(uricData);
  const wt   = JSON.parse(weightData);
  const ggt  = JSON.parse(ggtData);
  const alt  = JSON.parse(altData);

  const commonOptions = {
    responsive: true,
    plugins: { legend: { position: 'top' } },
    scales: { y: { beginAtZero: false } }
  };

  // Uric acid chart with danger line
  new Chart(document.getElementById('uricChart'), {
    type: 'line',
    data: {
      labels: L,
      datasets: [
        { label: '尿酸 μmol/L', data: uric, borderColor: '#dc3545', backgroundColor: 'rgba(220,53,69,.1)', tension: .3, fill: true },
        { label: '正常上限 420', data: Array(L.length).fill(420), borderColor: '#6c757d', borderDash: [5,5], pointRadius: 0 }
      ]
    },
    options: commonOptions
  });

  // Weight chart with target line
  new Chart(document.getElementById('weightChart'), {
    type: 'line',
    data: {
      labels: L,
      datasets: [
        { label: '体重 kg', data: wt, borderColor: '#fd7e14', backgroundColor: 'rgba(253,126,20,.1)', tension: .3, fill: true },
        { label: '目标 55kg', data: Array(L.length).fill(55), borderColor: '#6c757d', borderDash: [5,5], pointRadius: 0 }
      ]
    },
    options: commonOptions
  });

  // Liver chart
  new Chart(document.getElementById('liverChart'), {
    type: 'line',
    data: {
      labels: L,
      datasets: [
        { label: 'ALT U/L', data: alt, borderColor: '#0d6efd', tension: .3 },
        { label: 'GGT U/L', data: ggt, borderColor: '#ffc107', tension: .3 },
        { label: 'ALT正常线 40', data: Array(L.length).fill(40), borderColor: '#6c757d', borderDash: [5,5], pointRadius: 0 }
      ]
    },
    options: commonOptions
  });
</script>
</body>
</html>
