<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Health-Sync — 仪表盘</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <style>
    body { background: #f8f9fa; }
    .stat-card { border-left: 4px solid; border-radius: .5rem; }
    .card-uric  { border-left-color: #0d6efd; }
    .card-water { border-left-color: #0dcaf0; }
    .card-liver { border-left-color: #198754; }
    .card-weight{ border-left-color: #fd7e14; }
    .score-circle {
      width: 80px; height: 80px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; font-weight: bold; margin: 0 auto;
    }
  </style>
</head>
<body>
<div th:replace="~{fragments/nav :: navbar}"></div>
<div th:replace="~{fragments/nav :: flash}"></div>

<div class="container-fluid py-3 px-3">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0 fw-bold text-success">&#127968; 健康仪表盘</h5>
    <small class="text-muted" th:text="${d.todayDate}"></small>
  </div>

  <!-- ── 4 Stat Cards ─────────────────────────────────────────── -->
  <div class="row g-3 mb-4">

    <!-- 尿酸预算 -->
    <div class="col-6 col-lg-3">
      <div class="card stat-card card-uric h-100 shadow-sm">
        <div class="card-body p-3">
          <div class="text-muted small mb-1">今日嘌呤预算</div>
          <div class="fw-bold fs-5"
               th:text="${#numbers.formatDecimal(d.uricAcidBudget.remainingMg,1,1)} + ' mg 剩余'"></div>
          <div class="progress mt-2" style="height:6px">
            <div class="progress-bar"
                 th:classappend="${d.uricAcidBudget.status.cssClass == 'danger'} ? 'bg-danger' :
                                  (${d.uricAcidBudget.status.cssClass == 'orange'} ? 'bg-warning' :
                                  (${d.uricAcidBudget.status.cssClass == 'warning'} ? 'bg-warning' : 'bg-success'))"
                 th:style="'width:' + ${d.uricAcidBudget.progressPercent} + '%'"></div>
          </div>
          <small th:text="'已用 ' + ${#numbers.formatDecimal(d.uricAcidBudget.consumedMg,1,1)} + ' / ' + ${#numbers.formatDecimal(d.uricAcidBudget.totalBudgetMg,1,0)} + ' mg'"
                 class="text-muted"></small>
          <span class="badge mt-1 d-block"
                th:classappend="${d.uricAcidBudget.status.cssClass == 'danger'} ? 'bg-danger' :
                                 (${d.uricAcidBudget.status.cssClass == 'orange'} ? 'bg-warning text-dark' :
                                 (${d.uricAcidBudget.status.cssClass == 'warning'} ? 'bg-warning text-dark' : 'bg-success'))"
                th:text="${d.uricAcidBudget.status.label}"></span>
        </div>
      </div>
    </div>

    <!-- 饮水进度 -->
    <div class="col-6 col-lg-3">
      <div class="card stat-card card-water h-100 shadow-sm">
        <div class="card-body p-3">
          <div class="text-muted small mb-1">今日饮水</div>
          <div class="fw-bold fs-5" th:text="${d.todayWaterMl} + ' ml'"></div>
          <div class="progress mt-2" style="height:6px">
            <div class="progress-bar bg-info"
                 th:style="'width:' + ${d.waterProgressPct} + '%'"></div>
          </div>
          <small class="text-muted" th:text="'目标 ' + ${d.waterGoalMl} + ' ml'"></small>
          <span th:if="${d.waterProgressPct >= 100}" class="badge bg-success mt-1 d-block">&#10003; 达标</span>
          <span th:unless="${d.waterProgressPct >= 100}" class="badge bg-secondary mt-1 d-block"
                th:text="'还差 ' + (${d.waterGoalMl} - ${d.todayWaterMl}) + ' ml'"></span>
        </div>
      </div>
    </div>

    <!-- 脂肪肝进度 -->
    <div class="col-6 col-lg-3">
      <div class="card stat-card card-liver h-100 shadow-sm">
        <div class="card-body p-3">
          <div class="text-muted small mb-1">脂肪肝修复评分</div>
          <div th:if="${d.fattyLiverProgress.hasData}">
            <div class="fw-bold fs-5" th:text="${#numbers.formatDecimal(d.fattyLiverProgress.totalScore,1,1)} + ' 分'"></div>
            <div class="progress mt-2" style="height:6px">
              <div class="progress-bar bg-success"
                   th:style="'width:' + ${d.fattyLiverProgress.totalScore} + '%'"></div>
            </div>
            <small class="text-muted" th:text="${d.fattyLiverProgress.grade}"></small>
          </div>
          <div th:unless="${d.fattyLiverProgress.hasData}" class="text-muted small mt-2">暂无数据，请先录入指标</div>
        </div>
      </div>
    </div>

    <!-- 最新体重 / 尿酸 -->
    <div class="col-6 col-lg-3">
      <div class="card stat-card card-weight h-100 shadow-sm">
        <div class="card-body p-3">
          <div class="text-muted small mb-1">最新检测</div>
          <div th:if="${d.latestMetrics != null}">
            <div class="fw-bold" th:if="${d.latestMetrics.weightKg != null}"
                 th:text="'体重 ' + ${d.latestMetrics.weightKg} + ' kg'"></div>
            <div class="fw-bold" th:if="${d.latestMetrics.uricAcid != null}">
              尿酸
              <span th:text="${d.latestMetrics.uricAcid}"></span>
              <small th:classappend="${d.latestMetrics.uricAcid > 420} ? 'text-danger' : 'text-success'"
                     th:text="${d.latestMetrics.uricAcid > 420} ? ' ↑ 超标' : ' ✓ 正常'"></small>
            </div>
            <div th:if="${d.latestMetrics.ggt != null}">
              <small class="text-muted" th:text="'GGT ' + ${d.latestMetrics.ggt} + ' U/L'"></small>
            </div>
            <small class="text-muted" th:text="${d.latestMetrics.recordedAt}"></small>
          </div>
          <div th:unless="${d.latestMetrics != null}" class="text-muted small mt-2">暂无数据</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── 本周运动 ──────────────────────────────────────────────── -->
  <div class="row g-3 mb-4">
    <div class="col-12 col-md-6">
      <div class="card shadow-sm h-100">
        <div class="card-header bg-white fw-bold">&#127939; 本周运动概览</div>
        <div class="card-body">
          <div class="mb-2">
            <span class="text-muted">本周有效燃脂：</span>
            <strong th:text="${d.weeklyFatBurnMin} + ' 分钟'"></strong>
            <span th:if="${d.weeklyFatBurnMin >= 150}" class="badge bg-success ms-2">&#10003; 达标</span>
            <span th:unless="${d.weeklyFatBurnMin >= 150}" class="badge bg-warning text-dark ms-2"
                  th:text="'还差 ' + (150 - ${d.weeklyFatBurnMin}) + ' 分'"></span>
          </div>
          <div th:if="${d.recentExercise.isEmpty()}" class="text-muted small">本周暂无运动记录</div>
          <ul class="list-group list-group-flush" th:unless="${d.recentExercise.isEmpty()}">
            <li th:each="e : ${d.recentExercise}" class="list-group-item px-0 py-1 d-flex justify-content-between">
              <span>
                <span th:text="${e.exerciseDate}"></span>
                <span th:if="${e.exerciseType}" class="badge bg-light text-dark ms-1" th:text="${e.exerciseType}"></span>
              </span>
              <span>
                <span th:text="${e.durationMin} + '分钟'"></span>
                <span th:if="${e.fatBurnMin != null and e.fatBurnMin > 0}"
                      class="badge bg-warning text-dark ms-1" th:text="'燃脂 ' + ${e.fatBurnMin} + '分'"></span>
              </span>
            </li>
          </ul>
        </div>
      </div>
    </div>

    <!-- 快速操作 -->
    <div class="col-12 col-md-6">
      <div class="card shadow-sm h-100">
        <div class="card-header bg-white fw-bold">&#9889; 快速操作</div>
        <div class="card-body d-grid gap-2">
          <a th:href="@{/water}" class="btn btn-outline-info">&#128167; 记录饮水</a>
          <a th:href="@{/exercise}" class="btn btn-outline-warning">&#127939; 记录运动</a>
          <a th:href="@{/metrics}" class="btn btn-outline-primary">&#128203; 录入指标</a>
          <a th:href="@{/meals}" class="btn btn-outline-success">&#127869; 生成今日食谱</a>
        </div>
      </div>
    </div>
  </div>

  <!-- ── 果糖预警 ────────────────────────────────────────────────── -->
  <div th:if="${d.uricAcidBudget.fructoseWarning}"
       class="alert alert-warning d-flex align-items-center">
    &#9888;&#65039; <strong class="ms-2">果糖摄入预警：</strong>
    <span class="ms-1">今日果糖已达
      <strong th:text="${#numbers.formatDecimal(d.uricAcidBudget.fructoseTotalG,1,1)} + 'g'"></strong>
      （建议 &lt;25g/天），果糖会促进尿酸合成，请减少水果摄入。
    </span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
