<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Health-Sync — 膳食管理</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <style>
    :root {
      --apple-gray-1: #f5f5f7;
      --apple-gray-2: #e3e3e5;
      --apple-gray-5: #86868b;
      --apple-blue: #0071e3;
      --apple-green: #34c759;
      --apple-orange: #ff9500;
      --apple-red: #ff3b30;
      --apple-yellow: #ffd60a;
      --apple-cyan: #00c7d2;
      --apple-bg: #ffffff;
      --apple-card: #ffffff;
      --apple-text: #1d1d1f;
      --apple-text-secondary: #86868b;
      --apple-radius: 16px;
      --apple-radius-lg: 20px;
      --apple-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { -webkit-font-smoothing: antialiased; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      background: var(--apple-gray-1);
      color: var(--apple-text);
      min-height: 100vh;
      padding-bottom: 100px;
    }

    .nav-bottom {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--apple-bg);
      display: flex;
      justify-content: space-around;
      padding: 8px 0 max(8px, env(safe-area-inset-bottom));
      box-shadow: 0 -1px 0 rgba(0,0,0,0.1);
      z-index: 1000;
    }
    .nav-bottom a {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      text-decoration: none;
      color: var(--apple-text-secondary);
      font-size: 10px;
      transition: color 0.2s;
    }
    .nav-bottom a i { font-size: 22px; }
    .nav-bottom a.active { color: var(--apple-green); }

    .header {
      background: var(--apple-bg);
      padding: 16px 20px 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-title { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
    .header-sub { font-size: 13px; color: var(--apple-text-secondary); margin-top: 2px; }

    .budget-card {
      background: var(--apple-card);
      border-radius: var(--apple-radius);
      padding: 16px;
      margin: 0 20px 16px;
      box-shadow: var(--apple-shadow);
    }
    .budget-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .budget-label {
      font-size: 13px;
      font-weight: 600;
    }
    .budget-badge {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 12px;
      font-weight: 600;
    }
    .budget-badge.safe { background: rgba(52,199,89,0.15); color: var(--apple-green); }
    .budget-badge.warning { background: rgba(255,149,0,0.15); color: var(--apple-orange); }
    .budget-badge.danger { background: rgba(255,59,48,0.15); color: var(--apple-red); }

    .budget-bar {
      height: 8px;
      background: var(--apple-gray-1);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .budget-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s;
    }
    .budget-bar-fill.safe { background: var(--apple-green); }
    .budget-bar-fill.warning { background: var(--apple-orange); }
    .budget-bar-fill.danger { background: var(--apple-red); }

    .budget-stats {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--apple-text-secondary);
    }
    .budget-stats strong { color: var(--apple-text); }

    .fructose-warning {
      font-size: 12px;
      color: var(--apple-orange);
      margin-top: 8px;
      padding: 8px;
      background: rgba(255,149,0,0.1);
      border-radius: 8px;
    }

    .generate-btn {
      display: block;
      width: calc(100% - 40px);
      margin: 0 20px 16px;
      padding: 16px;
      background: linear-gradient(135deg, var(--apple-green), #2dbd4f);
      color: white;
      border: none;
      border-radius: var(--apple-radius);
      font-size: 16px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(52,199,89,0.3);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .generate-btn:active { transform: scale(0.98); }

    .meal-section {
      margin: 0 20px 16px;
    }
    .section-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .generated-card {
      background: var(--apple-card);
      border-radius: var(--apple-radius);
      overflow: hidden;
      box-shadow: var(--apple-shadow);
      margin-bottom: 12px;
    }
    .generated-header {
      background: var(--apple-green);
      color: white;
      padding: 12px 16px;
      font-weight: 600;
      font-size: 14px;
    }
    .generated-header .purine { font-size: 12px; opacity: 0.9; }
    .generated-body { padding: 16px; }

    .meal-item-card {
      background: var(--apple-gray-1);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .meal-item-card:last-child { margin-bottom: 0; }
    .meal-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .meal-type-badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 6px;
      font-weight: 600;
    }
    .meal-type-badge.breakfast { background: rgba(255,214,10,0.3); color: #8B6914; }
    .meal-type-badge.lunch { background: rgba(0,113,227,0.2); color: var(--apple-blue); }
    .meal-type-badge.dinner { background: rgba(175,82,222,0.2); color: #7B2CBF; }
    .meal-type-badge.snack { background: rgba(0,199,210,0.2); color: #00A3A3; }

    .meal-item-name { font-size: 15px; font-weight: 600; }
    .meal-item-desc { font-size: 12px; color: var(--apple-text-secondary); margin-bottom: 8px; }

    .food-list { margin-bottom: 8px; }
    .food-item {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 4px 0;
      border-bottom: 1px dashed var(--apple-gray-2);
    }
    .food-item:last-child { border-bottom: none; }
    .food-method {
      font-size: 11px;
      color: var(--apple-text-secondary);
      margin-top: 4px;
      padding-left: 8px;
    }

    .shopping-title {
      font-size: 13px;
      font-weight: 600;
      margin: 12px 0 8px;
      color: var(--apple-text);
    }
    .shopping-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    .shopping-item {
      display: flex;
      justify-content: space-between;
      padding: 8px;
      background: var(--apple-card);
      border-radius: 8px;
      font-size: 12px;
      border: 1px solid var(--apple-gray-2);
    }

    .today-meal-card {
      background: var(--apple-card);
      border-radius: var(--apple-radius);
      padding: 12px 16px;
      margin-bottom: 8px;
      box-shadow: var(--apple-shadow);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .today-meal-left { display: flex; align-items: center; gap: 10px; }
    .today-meal-name { font-size: 14px; font-weight: 500; }
    .today-meal-purine { font-size: 12px; color: var(--apple-text-secondary); }

    .library-link {
      display: block;
      text-align: center;
      padding: 12px;
      margin: 0 20px;
      background: var(--apple-gray-1);
      border-radius: var(--apple-radius);
      color: var(--apple-blue);
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
    }
    .library-link:active { background: var(--apple-gray-2); }

    .flash-success {
      background: rgba(52,199,89,0.1);
      border: 1px solid var(--apple-green);
      color: var(--apple-green);
      padding: 12px 16px;
      border-radius: var(--apple-radius);
      margin: 0 20px 16px;
      font-size: 14px;
    }
  </style>
</head>
<body>
<div class="header">
  <div class="header-title">膳食管理</div>
  <div class="header-sub" th:text="${today}"></div>
</div>

<nav class="nav-bottom">
  <a href="/"><i class="fas fa-house"></i>首页</a>
  <a href="/metrics"><i class="fas fa-chart-line"></i>趋势</a>
  <a href="/water"><i class="fas fa-droplet"></i>喝水</a>
  <a href="/exercise"><i class="fas fa-person-running"></i>运动</a>
  <a href="/meals/library"><i class="fas fa-utensils"></i>食谱</a>
</nav>

<div th:if="${successMsg}" class="flash-success" th:text="${successMsg}"></div>

<div class="budget-card">
  <div class="budget-header">
    <span class="budget-label">&#127359; 今日嘌呤预算</span>
    <span class="budget-badge safe" th:classappend="${budget.status.cssClass}"
          th:text="${budget.status.label}"></span>
  </div>
  <div class="budget-bar">
    <div class="budget-bar-fill safe" th:classappend="${budget.progressPercent >= 100} ? 'danger' : (${budget.progressPercent >= 75} ? 'warning' : 'safe')"
         th:style="'width:' + ${budget.progressPercent} + '%'"></div>
  </div>
  <div class="budget-stats">
    <span>已摄入 <strong th:text="${#numbers.formatDecimal(budget.consumedMg,1,1)}">0</strong> mg</span>
    <span>预算 <strong th:text="${#numbers.formatDecimal(budget.totalBudgetMg,1,0)}">0</strong> mg</span>
    <span>剩余 <strong th:text="${#numbers.formatDecimal(budget.remainingMg,1,1)}">0</strong> mg</span>
  </div>
  <div th:if="${budget.fructoseWarning}" class="fructose-warning">
    &#9888; 今日果糖 <span th:text="${#numbers.formatDecimal(budget.fructoseTotalG,1,1)}"></span>g 已超25g警戒线
  </div>
</div>

<form th:action="@{/meals/generate}" method="post">
  <button type="submit" class="generate-btn">
    &#127869; 随机生成今日食谱
  </button>
</form>

<a href="/meals/library" class="library-link">
  <i class="fas fa-book-open"></i> 浏览全部食谱库
</a>

<div th:if="${generatedMeal != null}" class="meal-section">
  <div class="section-title">&#9989; 今日推荐食谱</div>
  <div class="generated-card">
    <div class="generated-header">
      <div th:text="${generatedMeal.totalPurineMg} + ' mg嘌呤 · ' + ${generatedMeal.totalCalories} + ' kcal'"></div>
    </div>
    <div class="generated-body" id="generatedMealBody">
    </div>
  </div>
</div>

<div th:if="${!todayMeals.isEmpty()}" class="meal-section">
  <div class="section-title">&#128203; 今日已记录</div>
  <div th:each="r : ${todayMeals}" class="today-meal-card">
    <div class="today-meal-left">
      <span th:switch="${r.mealType}">
        <span th:case="'BREAKFAST'" class="meal-type-badge breakfast">早餐</span>
        <span th:case="'LUNCH'" class="meal-type-badge lunch">午餐</span>
        <span th:case="'DINNER'" class="meal-type-badge dinner">晚餐</span>
        <span th:case="*" class="meal-type-badge snack">加餐</span>
      </span>
      <span class="today-meal-name" th:if="${r.plan != null}" th:text="${r.plan.planName}"></span>
    </div>
    <div class="today-meal-purine" th:if="${r.totalPurineMg != null}"
         th:text="${#numbers.formatDecimal(r.totalPurineMg,1,1)} + 'mg'"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
  const generatedMeal = /*[[${generatedMeal}]]*/ null;

  function renderGeneratedMeal() {
    if (!generatedMeal || !generatedMeal.plans) return;
    const body = document.getElementById('generatedMealBody');
    if (!body) return;

    let html = '';
    const typeNames = { BREAKFAST: '早餐', LUNCH: '午餐', DINNER: '晚餐', SNACK: '加餐' };

    for (const [type, plan] of Object.entries(generatedMeal.plans)) {
      const typeLabel = typeNames[type] || type;
      const badgeClass = type.toLowerCase();
      const emoji = type === 'BREAKFAST' ? '&#127748;' : (type === 'LUNCH' ? '&#9728;&#65039;' : (type === 'DINNER' ? '&#127749;' : '&#127829;'));

      html += `<div class="meal-item-card">
        <div class="meal-item-header">
          <span class="meal-type-badge ${badgeClass}">${emoji} ${typeLabel}</span>
        </div>
        <div class="meal-item-name">${plan.planName || plan.name || ''}</div>
        <div class="meal-item-desc">${plan.description || ''}</div>
        <div class="food-list">`;

      if (plan.items) {
        plan.items.forEach(item => {
          html += `<div class="food-item">
            <span>${item.foodName || ''}</span>
            <span>${item.amountG}g</span>
          </div>`;
          if (item.cookingMethod) {
            html += `<div class="food-method"><strong>${item.foodName || ''}:</strong> ${item.cookingMethod}</div>`;
          }
        });
      }

      html += `</div></div>`;
    }

    if (generatedMeal.shoppingList && Object.keys(generatedMeal.shoppingList).length > 0) {
      html += `<div class="shopping-title">&#128717; 食材采购清单</div><div class="shopping-grid">`;
      for (const [name, amount] of Object.entries(generatedMeal.shoppingList)) {
        html += `<div class="shopping-item"><span>${name}</span><span>${Math.round(amount)}g</span></div>`;
      }
      html += `</div>`;
    }

    body.innerHTML = html;
  }

  renderGeneratedMeal();
</script>
</body>
</html>
