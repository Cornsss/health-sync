<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Health-Sync — 膳食管理</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-light">
<div th:replace="~{fragments/nav :: navbar}"></div>
<div th:replace="~{fragments/nav :: flash}"></div>

<div class="container-fluid py-3 px-3">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="fw-bold text-success mb-0">&#127869; 膳食管理</h5>
    <small class="text-muted" th:text="${today}"></small>
  </div>

  <!-- ── 尿酸预算状态栏 ─────────────────────────────────────────── -->
  <div class="card shadow-sm mb-3">
    <div class="card-body py-2">
      <div class="row align-items-center">
        <div class="col-auto">
          <span class="badge fs-6"
                th:classappend="${budget.status.cssClass == 'danger'} ? 'bg-danger' :
                                 (${budget.status.cssClass == 'warning'} ? 'bg-warning text-dark' :
                                 (${budget.status.cssClass == 'orange'} ? 'bg-warning text-dark' : 'bg-success'))"
                th:text="${budget.status.label}"></span>
        </div>
        <div class="col">
          <div class="progress" style="height:8px">
            <div class="progress-bar"
                 th:classappend="${budget.progressPercent >= 100} ? 'bg-danger' : 'bg-success'"
                 th:style="'width:' + ${budget.progressPercent} + '%'"></div>
          </div>
        </div>
        <div class="col-auto text-end">
          <small class="text-muted"
                 th:text="'嘌呤：' + ${#numbers.formatDecimal(budget.consumedMg,1,1)} + ' / ' + ${#numbers.formatDecimal(budget.totalBudgetMg,1,0)} + ' mg'"></small>
        </div>
      </div>
      <div th:if="${budget.fructoseWarning}" class="mt-1">
        <small class="text-warning fw-bold">
          &#9888; 今日果糖 <span th:text="${#numbers.formatDecimal(budget.fructoseTotalG,1,1)}"></span>g
          已超25g警戒线，请减少水果摄入
        </small>
      </div>
    </div>
  </div>

  <!-- ── 生成今日食谱按钮 ──────────────────────────────────────── -->
  <form th:action="@{/meals/generate}" method="post" class="mb-4">
    <button type="submit" class="btn btn-success btn-lg w-100">
      &#127869; 随机生成今日食谱（基于尿酸预算）
    </button>
  </form>

  <!-- ── 生成结果展示 ──────────────────────────────────────────── -->
  <div th:if="${generatedMeal != null}" class="mb-4">
    <div class="card shadow-sm border-success">
      <div class="card-header bg-success text-white fw-bold">
        今日推荐食谱 — 预估总嘌呤 <span th:text="${#numbers.formatDecimal(generatedMeal.totalPurineMg,1,1)}"></span>mg ·
        总热量 <span th:text="${#numbers.formatDecimal(generatedMeal.totalCalories,1,0)}"></span> kcal
      </div>
      <div class="card-body">
        <div class="row g-3">
          <div th:each="entry : ${generatedMeal.plans}" class="col-12 col-md-6">
            <div class="card border-0 bg-light">
              <div class="card-body p-3">
                <h6 class="card-title fw-bold mb-2">
                  <span th:switch="${entry.key}">
                    <span th:case="'BREAKFAST'">&#127748; 早餐</span>
                    <span th:case="'LUNCH'">&#9728;&#65039; 午餐</span>
                    <span th:case="'DINNER'">&#127749; 晚餐</span>
                    <span th:case="*">&#127829; 加餐</span>
                  </span>
                  — <span th:text="${entry.value.planName}"></span>
                </h6>
                <p class="small text-muted mb-2" th:text="${entry.value.description}"></p>
                <ul class="list-unstyled mb-0">
                  <li th:each="item : ${entry.value.items}" class="d-flex justify-content-between small">
                    <span th:text="${item.food.name}"></span>
                    <span class="text-muted" th:text="${item.amountG} + 'g'"></span>
                  </li>
                </ul>
              </div>
            </div>
          </div>
        </div>

        <!-- Shopping List -->
        <div th:unless="${generatedMeal.shoppingList.isEmpty()}" class="mt-3">
          <h6 class="fw-bold">&#128717; 今日食材采购清单</h6>
          <div class="row g-2">
            <div th:each="item : ${generatedMeal.shoppingList}" class="col-6 col-md-3">
              <div class="d-flex justify-content-between align-items-center bg-white rounded p-2 border">
                <span class="small" th:text="${item.key}"></span>
                <span class="badge bg-secondary" th:text="${#numbers.formatDecimal(item.value,1,0)} + 'g'"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── 今日已记录的膳食 ─────────────────────────────────────── -->
  <div th:if="${!todayMeals.isEmpty()}" class="card shadow-sm">
    <div class="card-header bg-white fw-bold">今日已记录膳食</div>
    <div class="card-body p-0">
      <ul class="list-group list-group-flush">
        <li th:each="r : ${todayMeals}" class="list-group-item d-flex justify-content-between align-items-center">
          <div>
            <span th:switch="${r.mealType}">
              <span th:case="'BREAKFAST'" class="badge bg-warning text-dark">早餐</span>
              <span th:case="'LUNCH'" class="badge bg-primary">午餐</span>
              <span th:case="'DINNER'" class="badge bg-info text-dark">晚餐</span>
              <span th:case="*" class="badge bg-secondary">加餐</span>
            </span>
            <span class="ms-2 small" th:if="${r.plan != null}" th:text="${r.plan.planName}"></span>
          </div>
          <div class="text-end">
            <small class="text-muted" th:if="${r.totalPurineMg != null}"
                   th:text="'嘌呤 ' + ${#numbers.formatDecimal(r.totalPurineMg,1,1)} + 'mg'"></small>
          </div>
        </li>
      </ul>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
