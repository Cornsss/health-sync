<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Health-Sync</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body>

<th:block th:fragment="flash">
  <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show mx-3 mt-3" role="alert" style="border-radius: 12px;">
    <span th:text="${successMsg}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show mx-3 mt-3" role="alert" style="border-radius: 12px;">
    <span th:text="${errorMsg}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
</th:block>

<th:block th:fragment="navbar">
  <nav class="nav-bottom">
    <a href="/"><i class="fas fa-house"></i>首页</a>
    <a href="/metrics"><i class="fas fa-chart-line"></i>趋势</a>
    <a href="/water"><i class="fas fa-droplet"></i>喝水</a>
    <a href="/exercise"><i class="fas fa-person-running"></i>运动</a>
    <a href="/meals"><i class="fas fa-utensils"></i>饮食</a>
  </nav>
</th:block>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
