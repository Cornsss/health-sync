<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Health-Sync — 饮水追踪</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <style>
    .water-circle {
      width: 160px; height: 160px; border-radius: 50%;
      border: 10px solid #e9ecef;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      margin: 0 auto; position: relative;
    }
    .water-circle.reached { border-color: #0dcaf0; }
    .wave-btn { width: 70px; height: 70px; border-radius: 50%; font-size: .85rem; }
  </style>
</head>
<body class="bg-light">
<div th:replace="~{fragments/nav :: navbar}"></div>
<div th:replace="~{fragments/nav :: flash}"></div>

<div class="container-fluid py-3 px-3">
  <h5 class="fw-bold text-info mb-3">&#128167; 饮水追踪</h5>

  <!-- ── 今日进度圆圈 ──────────────────────────────────────────── -->
  <div class="text-center mb-4">
    <div class="water-circle" th:classappend="${progressPct >= 100} ? 'reached' : ''">
      <div class="fw-bold fs-4" style="color:#0dcaf0" th:text="${todayTotal} + ' ml'"></div>
      <div class="text-muted small">今日饮水</div>
      <div class="fw-bold" th:text="${progressPct} + '%'"></div>
    </div>
    <div class="mt-2">
      <div class="progress mx-auto" style="max-width:280px;height:12px;border-radius:6px">
        <div class="progress-bar bg-info"
             th:style="'width:' + ${progressPct} + '%'"
             th:text="${progressPct} + '%'"></div>
      </div>
      <small class="text-muted" th:text="'目标 ' + ${goalMl} + ' ml'"></small>
    </div>
  </div>

  <!-- ── 快速记录按钮 ──────────────────────────────────────────── -->
  <div class="card shadow-sm mb-4">
    <div class="card-header bg-white fw-bold">&#43; 快速记录</div>
    <div class="card-body">
      <div class="row g-2 justify-content-center mb-3">
        <div class="col-3 text-center">
          <form th:action="@{/water/add}" method="post">
            <input type="hidden" name="amountMl" value="100"/>
            <button type="submit" class="btn btn-outline-info wave-btn">+100<br/><small>ml</small></button>
          </form>
        </div>
        <div class="col-3 text-center">
          <form th:action="@{/water/add}" method="post">
            <input type="hidden" name="amountMl" value="200"/>
            <button type="submit" class="btn btn-outline-info wave-btn">+200<br/><small>ml</small></button>
          </form>
        </div>
        <div class="col-3 text-center">
          <form th:action="@{/water/add}" method="post">
            <input type="hidden" name="amountMl" value="350"/>
            <button type="submit" class="btn btn-outline-info wave-btn">+350<br/><small>ml</small></button>
          </form>
        </div>
        <div class="col-3 text-center">
          <form th:action="@{/water/add}" method="post">
            <input type="hidden" name="amountMl" value="500"/>
            <button type="submit" class="btn btn-outline-info wave-btn">+500<br/><small>ml</small></button>
          </form>
        </div>
      </div>
      <!-- Custom amount -->
      <form th:action="@{/water/add}" method="post" class="d-flex gap-2 justify-content-center">
        <input type="number" name="amountMl" min="50" max="1000" step="50"
               placeholder="自定义 ml" class="form-control" style="max-width:140px"/>
        <button type="submit" class="btn btn-info text-white">记录</button>
      </form>
    </div>
  </div>

  <!-- ── 本周趋势图 ────────────────────────────────────────────── -->
  <div class="card shadow-sm mb-4">
    <div class="card-header bg-white fw-bold">本周饮水趋势</div>
    <div class="card-body"><canvas id="waterChart" height="120"></canvas></div>
  </div>

  <!-- ── 今日明细 ──────────────────────────────────────────────── -->
  <div class="card shadow-sm">
    <div class="card-header bg-white fw-bold">今日明细</div>
    <div class="card-body p-0">
      <div th:if="${todayLogs.isEmpty()}" class="text-center text-muted py-3">今日暂无记录，快来喝水吧！</div>
      <ul class="list-group list-group-flush" th:unless="${todayLogs.isEmpty()}">
        <li th:each="log : ${todayLogs}"
            class="list-group-item d-flex justify-content-between align-items-center">
          <span>
            &#128167;
            <strong th:text="${log.amountMl} + ' ml'"></strong>
            <small class="text-muted ms-2" th:text="${#temporals.format(log.loggedAt, 'HH:mm')}"></small>
          </span>
          <span class="badge bg-secondary" th:text="${log.source}"></span>
        </li>
      </ul>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<script th:inline="javascript">
  const weekLabels = JSON.parse(/*[[${weekLabels}]]*/ '[]');
  const weekData   = JSON.parse(/*[[${weekData}]]*/   '[]');

  new Chart(document.getElementById('waterChart'), {
    type: 'bar',
    data: {
      labels: weekLabels,
      datasets: [
        {
          label: '饮水量 ml',
          data: weekData,
          backgroundColor: weekData.map(v => v >= 2500 ? 'rgba(13,202,240,.8)' : 'rgba(13,202,240,.4)'),
          borderColor: 'rgba(13,202,240,1)',
          borderWidth: 1
        },
        {
          type: 'line',
          label: '目标 2500ml',
          data: Array(7).fill(2500),
          borderColor: '#dc3545',
          borderDash: [6, 3],
          pointRadius: 0,
          fill: false
        }
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { position: 'top' } },
      scales: { y: { beginAtZero: true, max: 3500 } }
    }
  });
</script>
</body>
</html>
