spring:
  application:
    name: health-sync

  # ── Default profile: PostgreSQL (Render) ──────────────────────────
  datasource:
    url: ${DB_URL:jdbc:h2:mem:healthsync;MODE=PostgreSQL;DB_CLOSE_DELAY=-1}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: update          # auto-create/update tables on startup
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: ${DB_DIALECT:org.hibernate.dialect.H2Dialect}

  thymeleaf:
    cache: false
    encoding: UTF-8

  # H2 console (only useful in local/dev)
  h2:
    console:
      enabled: true
      path: /h2-console

feishu:
  webhook:
    url: ${FEISHU_WEBHOOK_URL:}   # leave blank to disable push

server:
  port: ${PORT:8080}

---
# ── Profile: prod (Render deployment) ─────────────────────────────
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  h2:
    console:
      enabled: false
