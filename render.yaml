services:
  - type: web
    name: health-sync
    env: java
    plan: free
    buildCommand: "./mvnw clean package -DskipTests"
    startCommand: "java -Dspring.profiles.active=prod -jar target/health-sync-1.0.0.jar"
    envVars:
      - key: DB_URL
        fromDatabase:
          name: health-sync-db
          property: jdbcConnectionString
      - key: DB_USERNAME
        fromDatabase:
          name: health-sync-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: health-sync-db
          property: password
      - key: DB_DRIVER
        value: org.postgresql.Driver
      - key: DB_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: FEISHU_WEBHOOK_URL
        sync: false   # 手动在 Render Dashboard 填写

databases:
  - name: health-sync-db
    plan: free
    databaseName: healthsync
